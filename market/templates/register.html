{% extends "base.html" %}
{% block title %}회원가입{% endblock %}
{% block content %}
<h1>회원가입</h1>
<form class="stack" method="post" action="{{ url_for('auth.register') }}">
  <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
  <label for="username">사용자명 (3~20자, 영문/숫자/_)</label>
  <input id="username" name="username" required minlength="3" maxlength="20"
         pattern="[A-Za-z0-9_]+" autocomplete="username">
  <label for="password">비밀번호 (8자 이상, 영문+숫자)</label>
  <input id="password" name="password" type="password" required minlength="8"
         maxlength="128" autocomplete="new-password">
  <label for="confirm">비밀번호 확인</label>
  <input id="confirm" name="confirm" type="password" required autocomplete="new-password">
  <button class="btn" type="submit">가입하기</button>
</form>
<p class="muted small">이미 계정이 있으신가요? <a href="{{ url_for('auth.login') }}">로그인</a></p>
{% endblock %}
