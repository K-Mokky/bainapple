{% extends "base.html" %}
{% block title %}상품 수정{% endblock %}
{% block content %}
<h1>상품 수정</h1>
<form class="stack" method="post"
      action="{{ url_for('products.edit_product', product_id=product['id']) }}"
      enctype="multipart/form-data">
  <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
  <label for="title">상품명</label>
  <input id="title" name="title" required maxlength="100" value="{{ product['title'] }}">
  <label for="category">카테고리</label>
  <select id="category" name="category" required>
    {% for c in categories %}
    <option value="{{ c }}" {% if product['category'] == c %}selected{% endif %}>{{ c }}</option>
    {% endfor %}
  </select>
  <label for="price">가격 (원)</label>
  <input id="price" name="price" type="number" min="0" step="1" required value="{{ product['price'] }}">
  <label for="description">설명</label>
  <textarea id="description" name="description" required maxlength="2000">{{ product['description'] }}</textarea>
  <label for="image">사진 교체 (선택)</label>
  <input id="image" name="image" type="file" accept="image/png,image/jpeg,image/gif,image/webp">
  <button class="btn" type="submit">수정</button>
</form>
{% endblock %}
